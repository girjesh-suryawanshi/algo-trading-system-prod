services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: algo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d algo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./algo-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/algo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      postgres:
        condition: service_healthy

  python:
    build: ./algo-python
    ports:
      - "8000:8000"
    environment:
      SPRING_URL: http://backend:8080/api/trade
      PYTHONUNBUFFERED: "1"
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    depends_on:
      - backend

  ui:
    build: ./algo-ui
    ports:
      - "4200:80"
    depends_on:
      - backend
